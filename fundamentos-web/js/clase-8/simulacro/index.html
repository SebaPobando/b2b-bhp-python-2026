<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pliant:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Tirra:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">

</head>

<body>
    <header>
        <section class="logos">
            <img src="images/logo.png" alt="logo de mundo muñecas">
            <h1>MundoMuñecas</h1>
        </section>
        <section class="llamar">
            <img src="images/telefono-1.png" alt="">
            <p>Llámanos al: 222-2222</p>
        </section>
    </header>

    <nav>
        <ul>
            <li><a href="">Inicio</a></li>
            <li><a href="">Nuevas</a></li>
            <li><a href="">Nostros</a></li>
            <li><a href="">Blog</a></li>
            <li><a href="">Contacto</a></li>
        </ul>

        <section class="buscar">
            <input type="text" placeholder="Buscar Muñecas">
            <button>Buscar</button>
        </section>

        <section class="carrito">
            <h3 id="cantidad">5</h3>
            <img src="images/carrito-1.png" alt="carrito de compras">
        </section>
    </nav>

    <main>
        <section class="vendidos">
            <p>157 Muñecas, orden: <span id="orden">Más vendidas</span></p>
            <select name="" id="">
                <option value="Más Vendidas">Más vendidas</option>
                <option value="Precio">Precio</option>
                <option value="Puntuación">Puntuación</option>
            </select>
        </section>

        <section class="tarjetas">
            <figure class="tarjeta">
                <img src="images/mexicana.jpg" alt="muñeca mexicana">
                <p>Muñeca Mexicana</p>
                <button class="btn-agregar">
                    <img src="images/carrito-2.png" alt="agregar al carrito">
                </button>
            </figure>
            <figure class="tarjeta">
                <img src="images/china.jpg" alt="muñeca china">
                <p>Muñeca china</p>
                <button class="btn-agregar">
                    <img src="images/carrito-2.png" alt="agregar al carrito">
                </button>
            </figure>
            <figure class="tarjeta">
                <img src="images/africana.jpg" alt="">
                <p>Muñeca africana</p>
                <button class="btn-agregar">
                    <img src="images/carrito-2.png" alt="agregar al carrito">
                </button>
            </figure>
            <figure class="tarjeta">
                <img src="images/holandesa.jpg" alt="">
                <p>Muñeca holandesa</p>
                <button class="btn-agregar">
                    <img src="images/carrito-2.png" alt="agregar al carrito">
                </button>
            </figure>
        </section>

        <footer>
            <img src="images/logo.png" alt="logo mundo muñecas">
            <section class="iconos-footer">
                <img src="images/info.png" alt="información">
                <img src="images/email.png" alt="correo">
                <img src="images/telefono-2.png" alt="teléfono">
                <img id="pregunta" src="images/preguntas.png" alt="preguntas">
            </section>
        </footer>
    </main>
</body>

</html>
