<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">

<body>
    <header>

            <img src="images/logo.png" alt="logo de mundo muñecas">
            <h1>MundoMuñecas</h1>
        </section>
        <section class="llamar">
            <img src="images/telefono-1.png" alt="">
            <p>Llámanos al: 222-2222</p>
        </section>
    </header>

    <nav>
        <ul>
            <li><a href="">Inicio</a></li>
            <li><a href="">Nuevas</a></li>
            <li><a href="">Nostros</a></li>
            <li><a href="">Blog</a></li>
            <li><a href="">Contacto</a></li>
        </ul>

        <section class="buscar">
            <input type="text" placeholder="Buscar Muñecas">
            <button>Buscar</button>
        </section>

        <section class="carrito">
            <h3>5</h3>
            <img src="images/carrito-1.png" alt="carrito de compras">
        </section>

    <main>
        <section class="vendidos">
            <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit.</p>
            <select name="" id="">
                <option value=""></option>
                <option value=""></option>

            </select>

        <section class="tarjetas">
            <figure class="tarjeta">
                <img src="images/mexicana.jpg" alt="muñeca mexicana">
                <p>Muñeca Mexicana</p>
                <button>
                    <img src="images/carrito-2.png" alt="agregar al carrito">
                </button>
            </figure>
            <figure class="tarjeta">
                <img src="images/china.jpg" alt="muñeca china">
                <p>Muñeca china</p>
                <button>
                    <img src="images/carrito-2.png" alt="agregar al carrito">
                </button>
            </figure>
            <figure class="tarjeta">
                <img src="images/africana.jpg" alt="">
                <p>Muñeca africana</p>
                <button>
                    <img src="images/carrito-2.png" alt="agregar al carrito">
                </button>
            </figure>
            <figure class="tarjeta">
                <img src="images/holandesa.jpg" alt="">
                <p>Muñeca holandesa</p>
                <button>
                    <img src="images/carrito-2.png" alt="agregar al carrito">

        <footer>
            <img src="" alt="">
